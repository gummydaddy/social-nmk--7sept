
{% extends 'landing_page.html' %}
{% load static %}

{% block main_content %}
<style>
    #sc-wrap {
        display: flex; flex-direction: column; align-items: center;
        gap: 10px; padding: 10px;
    }
    #sc-stage {
        position: relative; width: 100%; max-width: 640px;
        aspect-ratio: 4/3; background: #111; border-radius: 12px;
        overflow: hidden;
    }
    #sc-remote-video {
        width: 100%; height: 100%; object-fit: cover; background: #000;
    }
    #sc-local-video {
        position: absolute; bottom: 10px; right: 10px;
        width: 110px; height: 82px; object-fit: cover;
        border-radius: 8px; border: 2px solid rgba(255,255,255,.6);
        transform: scaleX(-1); background: #222;
    }
    #sc-status {
        position: absolute; top: 10px; left: 10px; right: 10px;
        color: #fff; font-size: 13px; text-align: center;
        background: rgba(0,0,0,.4); padding: 6px 10px; border-radius: 8px;
    }
    #sc-partner-info {
        position: absolute; bottom: 10px; left: 10px;
        color: #fff; font-size: 12px; background: rgba(0,0,0,.4);
        padding: 4px 8px; border-radius: 6px;
    }
    #sc-controls {
        display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
        width: 100%; max-width: 640px;
    }
    #sc-controls button, #sc-controls select {
        padding: 10px 16px; border: none; border-radius: 20px;
        font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .sc-btn-start  { background:#16a34a; color:#fff; }
    .sc-btn-skip   { background:#007bff; color:#fff; }
    .sc-btn-stop   { background:#dc2626; color:#fff; }
    .sc-btn-mute   { background:#6b7280; color:#fff; }
    .sc-btn-mute.sc-muted { background:#fbbf24; color:#1a1a1a; }
    #sc-pref { padding: 10px; border-radius: 20px; border:1px solid #ccc; }
    #sc-controls button:disabled { opacity:.5; cursor:not-allowed; }
</style>
</br>
</br>
<div id="sc-wrap">
    <h3>🎥 Stranger Video Chat</h3>

    <div id="sc-stage">
        <video id="sc-remote-video" autoplay playsinline></video>
        <video id="sc-local-video" autoplay playsinline muted></video>
        <div id="sc-status">Press Start to find someone to chat with</div>
        <div id="sc-partner-info" style="display:none;"></div>
    </div>

    <div id="sc-controls">
        <select id="sc-pref">
            <option value="ANY">🌍 Anyone</option>
            {% for code, name in country_list %}
            <option value="{{ code }}">{{ name }}</option>
            {% endfor %}
        </select>
        <button id="sc-start-btn" class="sc-btn-start">▶ Start</button>
        <button id="sc-skip-btn" class="sc-btn-skip" disabled>⏭ Skip</button>
        <button id="sc-mute-btn" class="sc-btn-mute" disabled>🎤 Mute</button>
        <button id="sc-stop-btn" class="sc-btn-stop" disabled>⏹ Stop</button>
    </div>
</div>
{% endblock %}

{% block Message_script %}
<script>
(function () {
    'use strict';

    const ICE_SERVERS = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
        ]
    };

    const remoteVideo = document.getElementById('sc-remote-video');
    const localVideo  = document.getElementById('sc-local-video');
    const statusEl    = document.getElementById('sc-status');
    const partnerInfo = document.getElementById('sc-partner-info');
    const prefSelect  = document.getElementById('sc-pref');
    const startBtn    = document.getElementById('sc-start-btn');
    const skipBtn     = document.getElementById('sc-skip-btn');
    const stopBtn     = document.getElementById('sc-stop-btn');
    const muteBtn     = document.getElementById('sc-mute-btn');

    let ws = null;
    let pc = null;
    let localStream = null;
    let isMuted = false;
    let active = false;
    let fallbackTimer = null;

    function setStatus(msg) { statusEl.textContent = msg; }

    function setButtons({ start, skip, stop, mute }) {
        startBtn.disabled = !start;
        skipBtn.disabled  = !skip;
        stopBtn.disabled  = !stop;
        muteBtn.disabled  = !mute;
    }

    function connectWS() {
        const proto = location.protocol === 'https:' ? 'wss' : 'ws';
        ws = new WebSocket(proto + '://' + location.host + '/ws/stranger/');

        ws.onopen = function () {
            sendFind();
        };

        ws.onmessage = function (e) {
            const data = JSON.parse(e.data);
            handleMessage(data);
        };

        ws.onclose = function () {
            if (active) {
                setStatus('Disconnected. Press Start to try again.');
                cleanup(false);
            }
        };

        ws.onerror = function () {
            setStatus('Connection error.');
        };
    }

    function sendFind() {
        const country = prefSelect.value;
        setStatus('🔎 Searching for a stranger…');
        partnerInfo.style.display = 'none';
        ws.send(JSON.stringify({ type: 'find', country: country }));

        // fallback: if no match in 20s and a specific country was chosen,
        // widen the search to "Anyone"
        clearTimeout(fallbackTimer);
        if (country !== 'ANY') {
            fallbackTimer = setTimeout(function () {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    setStatus('🔎 No one nearby — widening search to Anyone…');
                    ws.send(JSON.stringify({ type: 'find', country: 'ANY' }));
                }
            }, 20000);
        }
    }

    function handleMessage(data) {
        switch (data.type) {
            case 'searching':
                setStatus('🔎 Searching for a stranger…');
                break;

            case 'matched':
                clearTimeout(fallbackTimer);
                onMatched(data);
                break;

            case 'webrtc_offer':
                onOffer(data.payload);
                break;

            case 'webrtc_answer':
                onAnswer(data.payload);
                break;

            case 'ice_candidate':
                onRemoteIce(data.payload);
                break;

            case 'partner_left':
                setStatus('Stranger disconnected. Searching for someone new…');
                closePeerConnection();
                partnerInfo.style.display = 'none';
                if (active) { sendFind(); }
                break;

            case 'stopped':
                setStatus('Chat stopped. Press Start to begin again.');
                cleanup(false);
                break;
        }
    }

    function createPeerConnection() {
        pc = new RTCPeerConnection(ICE_SERVERS);

        pc.onicecandidate = function (evt) {
            if (evt.candidate) {
                ws.send(JSON.stringify({ type: 'ice_candidate', payload: evt.candidate }));
            }
        };

        pc.ontrack = function (evt) {
            if (evt.streams && evt.streams[0]) {
                remoteVideo.srcObject = evt.streams[0];
            }
        };

        pc.oniceconnectionstatechange = function () {
            if (pc && (pc.iceConnectionState === 'failed')) {
                setStatus('Connection issue — skipping…');
                doSkip();
            }
        };

        localStream.getTracks().forEach(function (t) { pc.addTrack(t, localStream); });
    }

    async function onMatched(data) {
        partnerInfo.textContent = '👤 ' + data.partner.username +
            (data.partner.country && data.partner.country !== 'ANY' ? ' · ' + data.partner.country : '');
        partnerInfo.style.display = 'block';
        setStatus('Connected!');

        closePeerConnection();
        createPeerConnection();

        if (data.role === 'offerer') {
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            ws.send(JSON.stringify({ type: 'webrtc_offer', payload: offer }));
        }
    }

    async function onOffer(offer) {
        if (!pc) { createPeerConnection(); }
        await pc.setRemoteDescription(new RTCSessionDescription(offer));
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        ws.send(JSON.stringify({ type: 'webrtc_answer', payload: answer }));
    }

    async function onAnswer(answer) {
        if (pc) {
            await pc.setRemoteDescription(new RTCSessionDescription(answer));
        }
    }

    async function onRemoteIce(candidate) {
        if (pc) {
            try { await pc.addIceCandidate(new RTCIceCandidate(candidate)); }
            catch (e) { console.warn('ICE add error:', e); }
        }
    }

    function closePeerConnection() {
        if (pc) { pc.close(); pc = null; }
        remoteVideo.srcObject = null;
    }

    function doSkip() {
        closePeerConnection();
        partnerInfo.style.display = 'none';
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'skip' }));
        }
        setStatus('🔎 Searching for a stranger…');
    }

    async function start() {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        } catch (err) {
            setStatus('Camera/microphone access denied.');
            return;
        }

        localVideo.srcObject = localStream;
        active = true;
        setButtons({ start: false, skip: true, stop: true, mute: true });
        prefSelect.disabled = true;
        connectWS();
    }

    function cleanup(sendStop) {
        active = false;
        closePeerConnection();

        if (ws) {
            if (sendStop && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'stop' }));
            }
            ws.close();
            ws = null;
        }

        if (localStream) {
            localStream.getTracks().forEach(function (t) { t.stop(); });
            localStream = null;
        }

        localVideo.srcObject = null;
        partnerInfo.style.display = 'none';
        isMuted = false;
        muteBtn.textContent = '🎤 Mute';
        muteBtn.classList.remove('sc-muted');
        setButtons({ start: true, skip: false, stop: false, mute: false });
        prefSelect.disabled = false;
    }

    function toggleMute() {
        if (!localStream) return;
        isMuted = !isMuted;
        localStream.getAudioTracks().forEach(function (t) { t.enabled = !isMuted; });
        muteBtn.textContent = isMuted ? '🔇 Unmute' : '🎤 Mute';
        muteBtn.classList.toggle('sc-muted', isMuted);
    }

    startBtn.addEventListener('click', start);
    skipBtn.addEventListener('click', doSkip);
    stopBtn.addEventListener('click', function () { cleanup(true); setStatus('Chat stopped. Press Start to begin again.'); });
    muteBtn.addEventListener('click', toggleMute);

    window.addEventListener('beforeunload', function () { cleanup(true); });
})();
</script>
{% endblock %}
